<!--
MOCKUP-ID: 2.3.1
Title: Profile View
Story: 2.3.1
Design-System-Refs: surface, background, primary, accent, text-primary, text-muted, avatar, badges, Progress Bar
Notes:
  - Shows child's display name, avatar, badges, basic session stats
  - Accessible profile area linked from app shell
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mockup 2.3.1 — Profile View</title>
<style>
:root{--primary:#3B82F6;--accent:#10B981;--surface:#F8FAFC;--bg:#FFFFFF;--text:#0F172A;--muted:#64748B;--radius:12px;--space:16px}
*{box-sizing:border-box}
body{font-family:Poppins,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:linear-gradient(#F8FAFF,#FFF);color:var(--text);padding:var(--space)}
.container{max-width:920px;margin:0 auto}
.card{background:var(--surface);padding:var(--space);border-radius:var(--radius);border:1px solid #E6EDF8}
.header{display:flex;gap:16px;align-items:center}
.avatar{width:96px;height:96px;border-radius:50%;background:#fff;border:4px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:2rem}
.info{flex:1}
.name{font-weight:700;font-size:1.25rem}
.meta{color:var(--muted);font-size:0.9rem}
.stats{display:flex;gap:12px;margin-top:12px}
.stat{background:var(--bg);padding:10px;border-radius:10px;flex:1;text-align:center;border:1px solid #E9F2FF}
.badges{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.badge{background:var(--accent);color:#fff;padding:6px 10px;border-radius:999px;font-weight:700}
.section{margin-top:20px}
.small{font-size:0.9rem;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
  <div class="card" role="region" aria-label="Profile">
    <div class="header">
      <div class="avatar" aria-hidden="true">🙂</div>
      <div class="info">
        <div class="name">Alex</div>
        <div class="meta">Age: 9 • Level: 2</div>
        <div class="stats">
          <div class="stat"><div style="font-weight:700">12</div><div class="small">Rounds</div></div>
          <div class="stat"><div style="font-weight:700">84%</div><div class="small">Accuracy</div></div>
          <div class="stat"><div style="font-weight:700">3</div><div class="small">Badges</div></div>
        </div>
        <div class="badges" aria-label="Badges earned">
          <div class="badge">First Win</div>
          <div class="badge">Streak 3</div>
          <div class="badge">Quick Solver</div>
        </div>
      </div>
      <div><button style="padding:8px 12px;border-radius:10px;border:2px solid var(--primary);background:#fff">Edit Profile</button></div>
    </div>

    <div class="section" aria-labelledby="recent-title">
      <div id="recent-title" style="font-weight:700;margin-bottom:8px">Recent session summary</div>
      <div style="display:flex;gap:12px;align-items:center">
        <div style="flex:1">
          <div style="height:10px;background:#E6EDF8;border-radius:99px;overflow:hidden">
            <div style="width:68%;height:100%;background:var(--accent)"></div>
          </div>
          <div class="small" style="margin-top:6px">Accuracy 68% • 4 rounds</div>
        </div>
        <div style="width:140px;text-align:right"><button style="padding:8px 12px;border-radius:10px;background:var(--primary);color:#fff">View details</button></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
