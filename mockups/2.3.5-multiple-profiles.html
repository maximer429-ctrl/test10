<!--
MOCKUP-ID: 2.3.5
Title: Multiple Profiles & Quick-switch
Story: 2.3.5
Design-System-Refs: profile-list, quick-switch, avatars, buttons
Notes:
  - Shows multiple local profiles and a quick-switch UI that preserves session state
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mockup 2.3.5 — Multiple Profiles</title>
<style>
:root{--bg:#fff;--muted:#64748B;--primary:#3B82F6;--space:14px}
body{font-family:Poppins,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#F7F9FF;color:#0F172A;padding:var(--space)}
.wrap{max-width:760px;margin:0 auto}
.list{display:flex;gap:12px;background:#fff;padding:12px;border-radius:12px;border:1px solid #E6EDF8}
.profile{width:120px;padding:10px;border-radius:10px;background:#fff;border:1px solid #EEF6FF;text-align:center}
.active{box-shadow:0 6px 16px rgba(15,23,42,0.06);border:2px solid var(--primary)}
.switcher{margin-top:12px;background:#fff;padding:10px;border-radius:10px;border:1px solid #E6EDF8;display:flex;align-items:center;justify-content:space-between}
.btn{padding:8px 10px;border-radius:8px;background:var(--primary);color:#fff;border:none}
.small{font-size:0.9rem;color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <div style="font-weight:700;margin-bottom:8px">Profiles</div>
    <div class="list" role="list">
      <div class="profile active" role="listitem">
        <div style="font-size:2rem">🙂</div>
        <div style="font-weight:700">Alex</div>
        <div class="small">Rounds: 12</div>
      </div>
      <div class="profile" role="listitem">
        <div style="font-size:2rem">🦊</div>
        <div style="font-weight:700">Jamie</div>
        <div class="small">Rounds: 4</div>
      </div>
      <div class="profile" role="listitem">
        <div style="font-size:2rem">🦄</div>
        <div style="font-weight:700">Taylor</div>
        <div class="small">Rounds: 0</div>
      </div>
    </div>

    <div class="switcher" aria-label="Quick switch">
      <div>
        <div style="font-weight:700">Quick switch</div>
        <div class="small">Tap a profile to switch — session for the other profiles is preserved</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn">Switch</button>
        <button style="padding:8px 10px;border-radius:8px;border:1px solid #E6EDF8;background:#fff">Manage</button>
      </div>
    </div>
  </div>
</body>
</html>
